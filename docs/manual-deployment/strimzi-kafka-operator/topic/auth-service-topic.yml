---
apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: cinemesh.auth-service.user-logs
  namespace: kafka
  labels:
    # MUST match your core Kafka cluster name!
    strimzi.io/cluster: cinemesh-kafka
spec:
  partitions: 3
  replicas: 1
  config:
    retention.ms: 604800000 # 7 Days
    segment.bytes: 1073741824
---
apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: debezium-heartbeat.cinemesh-auth-db-server
  labels:
    strimzi.io/cluster: kafka-cluster
spec:
  partitions: 1
  replicas: 3
  config:
    retention.ms: 2419200000
    segment.bytes: 1073741824
