---
# Service: Internal Networking (The "Company Way")
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: default
spec:
  selector:
    app: auth-service
  ports:
    - protocol: TCP
      port: 80         # 🌟 Kong calls this clean port
      targetPort: 8080 # 🌟 K8s secretly forwards it to Spring Boot on 8080
  type: ClusterIP

---
# Deployment: The Pod & Image
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          # Using the Monorepo Tagging strategy!
          image: registry.digitalocean.com/cinemesh-registry-truongbb/cinemesh:auth-service-v1.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          env:
            # 1. Activate Kubernetes Profile
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            - name: SPRING_CONFIG_IMPORT
              value: "optional:configserver:http://config-server:8888/"
            # 2. Inject DB Password from K8s Secret Vault
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cinemesh-secrets
                  key: DB_PASSWORD
