server:
  port: 8888

spring:
  application:
    name: config-server
  messages:
    basename: messages
    encoding: UTF-8
    fallback-to-system-locale: false
  profiles:
    active: native # local file instead of git
  cloud:
    config:
      server:
        #        native:
        #          search-locations: file:///${user.dir}/config-files # point to config-files folder
        git:
          uri: ${SPRING_CLOUD_CONFIG_SERVER_GIT_URI} # 1. The URL to your Git repository
          default-label: ${SPRING_CLOUD_CONFIG_SERVER_GIT_DEFAULT_LABEL} # 2. The branch to read from (usually main or master)
          search-paths: ${SPRING_CLOUD_CONFIG_SERVER_GIT_SEARCH_PATHS} # 3. The specific folder(s) inside the repo to look for YAML files
          username: ${GIT_USERNAME} # 4. Security (We use environment variables so we don't hardcode secrets!)
          password: ${GIT_TOKEN} # 4. Security (We use environment variables so we don't hardcode secrets!)
