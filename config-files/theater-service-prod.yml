server:
  port: 8080

spring:
  application:
    name: theater-service
  datasource:
    url: jdbc:postgresql://postgres-postgresql:5432/cinemesh_theater_db
    username: cinemesh
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
