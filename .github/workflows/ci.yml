name: Phase 1 - Continuous Integration

# 1. THE TRIGGER: Run this every time code is pushed to main, or a PR is created
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ==========================================
  # JOB 1: THE GATEKEEPER (Test the Code)
  # ==========================================
  gatekeeper:
    name: Build and Test Java Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

  # ==========================================
  # JOB 2: THE FACTORY (Build & Push Docker Images)
  # ==========================================
  artifact-factory:
    name: Build and Push Images
    runs-on: ubuntu-latest
    # 🌟 CRITICAL: This stops Job 2 from running if Job 1 fails!
    needs: gatekeeper

    # Only run this job if code is merged to main (don't push PRs to the registry)
    if: github.ref == 'refs/heads/main'

    # The Matrix dynamically loops through all your services
    strategy:
      matrix:
        service: [auth-service, booking-service, movie-service, notification-service, payment-service, theater-service]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install DigitalOcean CLI
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Log in to DO Container Registry
        run: doctl registry login --expiry-seconds 1200

      # Note: We run this from the root of the repo, pointing to the specific Dockerfile
      - name: Build and Push ${{ matrix.service }}
        run: |
          # 1. Build and tag
          docker build -f services/${{ matrix.service }}/Dockerfile -t registry.digitalocean.com/cinemesh-registry-truongbb/cinemesh:${{ matrix.service }}-${{ github.sha }} .
          
          # 2. Push to the single cinemesh repository
          docker push registry.digitalocean.com/cinemesh-registry-truongbb/cinemesh:${{ matrix.service }}-${{ github.sha }}

  # ==========================================
  # JOB 3: THE DEPLOYMENT (Update Kubernetes)
  # ==========================================
  deploy-to-cluster:
    name: Deploy to Production
    runs-on: ubuntu-latest

    # 🌟 CRITICAL: Do not run this until the Factory job finishes successfully!
    needs: artifact-factory

    # Only deploy if we are on the main branch
    if: github.ref == 'refs/heads/main'

    # We need the matrix again to deploy each service individually
    strategy:
      matrix:
        service: [auth-service, booking-service, movie-service, notification-service, payment-service, theater-service]

    steps:
      # 1. AUTHENTICATION: We need doctl again in this new virtual machine
      - name: Install DigitalOcean CLI
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      # 2. CLUSTER ACCESS: Download the K8s security keys
      - name: Save DigitalOcean Kubeconfig
        # ⚠️ Replace <your-cluster-name> with the exact name of your DOKS cluster!
        run: doctl kubernetes cluster config save <your-cluster-name>

      # 3. THE ROLLOUT: Tell K8s to update the specific deployment
      - name: Deploy ${{ matrix.service }} to Kubernetes
        run: |
          # Patch the live cluster with the new Docker image tag
          kubectl set image deployment/${{ matrix.service }} \
            ${{ matrix.service }}=registry.digitalocean.com/cinemesh-registry-truongbb/cinemesh:${{ matrix.service }}-${{ github.sha }} \
            -n default
          
          # Wait and verify that the new pods start up successfully
          kubectl rollout status deployment/${{ matrix.service }} -n default
