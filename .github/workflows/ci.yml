name: Phase 1 - Continuous Integration

# 1. THE TRIGGER: Run this every time code is pushed to main, or a PR is created
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  gatekeeper:
    name: Build and Test
    runs-on: ubuntu-latest # GitHub provides this Linux server for free

    steps:
      # 2. GET THE CODE: Download your repository onto the GitHub server
      - name: Checkout Code
        uses: actions/checkout@v3

      # 3. ENVIRONMENT SETUP: Install Java 17 and configure Maven caching to make it fast
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # 4. THE TEST: Compile the code and run all unit tests
      - name: Run Maven Build and Tests
        run: mvn -B clean test

      # 5. AUTHENTICATION: Log into DigitalOcean
      - name: Install DigitalOcean CLI
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Log in to DO Container Registry
        run: doctl registry login --expiry-seconds 1200

      # 6. BUILD & PUSH: Package the app and send it to the vault
      - name: Build and Push Docker Image
        run: |
          docker build -t registry.digitalocean.com/cinemesh-registry-truongbb/booking-service:${{ github.sha }} .
          docker push registry.digitalocean.com/cinemesh-registry-truongbb/booking-service:${{ github.sha }}
